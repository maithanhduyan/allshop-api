openapi: "3.0.3"
info:
  title: AllShop API
  description: |
    Backend API cho ứng dụng bán hàng trực tuyến **AllShop**.

    ## Xác thực
    Các endpoint được đánh dấu 🔒 yêu cầu JWT token trong header:
    ```
    Authorization: Bearer <token>
    ```
    Token nhận được sau khi đăng ký hoặc đăng nhập.
  version: "1.0.0"
  contact:
    name: AllShop Team

servers:
  - url: http://localhost:8000
    description: Local development

tags:
  - name: Products
    description: Quản lý sản phẩm
  - name: Categories
    description: Danh mục sản phẩm
  - name: Auth
    description: Đăng ký, đăng nhập, đăng xuất
  - name: Users
    description: Thông tin người dùng
  - name: Cart
    description: Giỏ hàng
  - name: Orders
    description: Đơn hàng
  - name: Invoices
    description: Hóa đơn điện tử
  - name: Accounting
    description: Kế toán — hệ thống tài khoản, bút toán, bảng cân đối
  - name: Reports
    description: Báo cáo doanh thu, thuế, cân đối tài khoản, dashboard

components:
  securitySchemes:
    BearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT

  schemas:
    Product:
      type: object
      properties:
        id:
          type: string
          example: "1"
        name:
          type: string
          example: "Áo thun nam cổ tròn Premium Cotton"
        slug:
          type: string
          example: "ao-thun-nam-co-tron"
        description:
          type: string
          example: "Áo thun nam chất liệu 100% cotton cao cấp"
        price:
          type: number
          example: 199000
        originalPrice:
          type: number
          nullable: true
          example: 350000
        images:
          type: array
          items:
            type: string
          example: ["https://picsum.photos/seed/fashion1/600/600"]
        category:
          type: string
          enum: [fashion, electronics, tools, computers, phones, accessories]
          example: "fashion"
        brand:
          type: string
          example: "AllShop Basic"
        rating:
          type: number
          format: float
          example: 4.5
        reviewCount:
          type: integer
          example: 128
        stock:
          type: integer
          example: 50
        specifications:
          type: object
          additionalProperties:
            type: string
          example:
            "Chất liệu": "100% Cotton"
            "Xuất xứ": "Việt Nam"
        createdAt:
          type: string
          format: date-time

    Category:
      type: object
      properties:
        id:
          type: string
          example: "fashion"
        name:
          type: string
          example: "Thời trang"
        emoji:
          type: string
          example: "👕"

    User:
      type: object
      properties:
        id:
          type: string
          example: "1"
        name:
          type: string
          example: "Nguyễn Văn A"
        email:
          type: string
          format: email
          example: "user@allshop.vn"
        phone:
          type: string
          nullable: true
          example: "0901234567"
        avatar:
          type: string
          nullable: true
        createdAt:
          type: string
          format: date-time

    CartItem:
      type: object
      properties:
        productId:
          type: string
          example: "1"
        name:
          type: string
          example: "Áo thun nam cổ tròn Premium Cotton"
        image:
          type: string
          example: "https://picsum.photos/seed/fashion1/600/600"
        price:
          type: number
          example: 199000
        quantity:
          type: integer
          example: 2
        stock:
          type: integer
          example: 50

    OrderItem:
      type: object
      properties:
        productId:
          type: string
        name:
          type: string
        image:
          type: string
        price:
          type: number
        quantity:
          type: integer

    Order:
      type: object
      properties:
        id:
          type: string
          example: "1"
        userId:
          type: string
        items:
          type: array
          items:
            $ref: "#/components/schemas/OrderItem"
        total:
          type: number
          example: 398000
        status:
          type: string
          enum: [pending, confirmed, shipping, delivered, cancelled]
          example: "pending"
        name:
          type: string
          example: "Nguyễn Văn A"
        phone:
          type: string
          example: "0901234567"
        address:
          type: string
          example: "123 Nguyễn Huệ, Q.1, TP.HCM"
        note:
          type: string
        createdAt:
          type: string
          format: date-time

    ProductListResponse:
      type: object
      properties:
        products:
          type: array
          items:
            $ref: "#/components/schemas/Product"
        total:
          type: integer
          example: 8

    AuthResponse:
      type: object
      properties:
        token:
          type: string
          example: "eyJhbGciOiJIUzI1NiIs..."
        user:
          $ref: "#/components/schemas/User"

    Error:
      type: object
      properties:
        error:
          type: string
          example: "error message"

    Invoice:
      type: object
      properties:
        id:
          type: string
          example: "1"
        invoiceNumber:
          type: string
          example: "HD-20260313-0001"
        orderId:
          type: string
          example: "5"
        userId:
          type: string
          example: "1"
        sellerName:
          type: string
          example: "Công ty TNHH AllShop Việt Nam"
        sellerTaxCode:
          type: string
          example: "0123456789"
        sellerAddress:
          type: string
          example: "123 Nguyễn Huệ, Quận 1, TP. Hồ Chí Minh"
        buyerName:
          type: string
          example: "Nguyễn Văn A"
        buyerTaxCode:
          type: string
          nullable: true
          example: "0987654321"
        buyerAddress:
          type: string
          example: "456 Lê Lợi, Q.3, TP.HCM"
        buyerEmail:
          type: string
          example: "buyer@example.com"
        subtotal:
          type: number
          example: 1500000
        taxRate:
          type: number
          example: 0.08
        taxAmount:
          type: number
          example: 120000
        totalAmount:
          type: number
          example: 1620000
        status:
          type: string
          enum: [draft, issued, cancelled]
          example: "draft"
        items:
          type: array
          items:
            $ref: "#/components/schemas/InvoiceItem"
        issuedAt:
          type: string
          format: date-time
          nullable: true
        cancelledAt:
          type: string
          format: date-time
          nullable: true
        createdAt:
          type: string
          format: date-time

    InvoiceItem:
      type: object
      properties:
        id:
          type: string
          example: "1"
        invoiceId:
          type: string
          example: "1"
        productId:
          type: string
          example: "3"
        productName:
          type: string
          example: "Áo thun nam cotton"
        unit:
          type: string
          example: "Cái"
        quantity:
          type: integer
          example: 2
        unitPrice:
          type: number
          example: 250000
        taxRate:
          type: number
          example: 0.08
        taxAmount:
          type: number
          example: 40000
        totalAmount:
          type: number
          example: 540000

    Account:
      type: object
      properties:
        id:
          type: string
          example: "1"
        code:
          type: string
          example: "131"
        name:
          type: string
          example: "Phải thu của khách hàng"
        type:
          type: string
          enum: [asset, liability, equity, revenue, expense]
          example: "asset"
        parentCode:
          type: string
          nullable: true
          example: null
        level:
          type: integer
          example: 1
        isActive:
          type: boolean
          example: true
        createdAt:
          type: string
          format: date-time

    JournalEntry:
      type: object
      properties:
        id:
          type: string
          example: "1"
        entryNumber:
          type: string
          example: "JE-20260313-0001"
        invoiceId:
          type: string
          nullable: true
          example: "5"
        description:
          type: string
          example: "Ghi nhận doanh thu hóa đơn HD-20260313-0001"
        entryDate:
          type: string
          format: date
          example: "2026-03-13"
        status:
          type: string
          enum: [posted, reversed]
          example: "posted"
        reversedBy:
          type: string
          nullable: true
        reverses:
          type: string
          nullable: true
        lines:
          type: array
          items:
            $ref: "#/components/schemas/JournalLine"
        createdAt:
          type: string
          format: date-time

    JournalLine:
      type: object
      properties:
        id:
          type: string
          example: "1"
        journalEntryId:
          type: string
          example: "1"
        accountCode:
          type: string
          example: "131"
        accountName:
          type: string
          example: "Phải thu của khách hàng"
        description:
          type: string
          example: "Phải thu từ khách hàng"
        debit:
          type: number
          example: 1620000
        credit:
          type: number
          example: 0

    TrialBalanceRow:
      type: object
      properties:
        accountCode:
          type: string
          example: "131"
        accountName:
          type: string
          example: "Phải thu của khách hàng"
        totalDebit:
          type: number
          example: 1620000
        totalCredit:
          type: number
          example: 0
        balance:
          type: number
          example: 1620000

    RevenueReport:
      type: object
      properties:
        from:
          type: string
          format: date
        to:
          type: string
          format: date
        days:
          type: array
          items:
            type: object
            properties:
              date:
                type: string
                format: date
              invoiceCount:
                type: integer
              subtotal:
                type: number
              tax:
                type: number
              total:
                type: number
        totalInvoices:
          type: integer
        totalSubtotal:
          type: number
        totalTax:
          type: number
        totalRevenue:
          type: number

    TaxReport:
      type: object
      properties:
        from:
          type: string
          format: date
        to:
          type: string
          format: date
        outputTax:
          type: number
        inputTax:
          type: number
        cancelledTax:
          type: number
        netTaxPayable:
          type: number

    AccountBalanceReport:
      type: object
      properties:
        from:
          type: string
          format: date
        to:
          type: string
          format: date
        accounts:
          type: array
          items:
            type: object
            properties:
              accountCode:
                type: string
              accountName:
                type: string
              openingDebit:
                type: number
              openingCredit:
                type: number
              periodDebit:
                type: number
              periodCredit:
                type: number
              closingDebit:
                type: number
              closingCredit:
                type: number

    DashboardSummary:
      type: object
      properties:
        invoices:
          type: object
          properties:
            total:
              type: integer
            issued:
              type: integer
            cancelled:
              type: integer
            revenue:
              type: number
            tax:
              type: number
        journalEntries:
          type: object
          properties:
            total:
              type: integer
            posted:
              type: integer
            reversed:
              type: integer
        accounting:
          type: object
          properties:
            totalDebit:
              type: number
            totalCredit:
              type: number
            isBalanced:
              type: boolean
            totalAccounts:
              type: integer
        orders:
          type: object
          properties:
            total:
              type: integer
            revenue:
              type: number

paths:
  # ──────────── Products ────────────
  /api/products:
    get:
      tags: [Products]
      summary: Danh sách sản phẩm
      description: Lấy tất cả sản phẩm, có thể lọc theo danh mục hoặc tìm kiếm.
      parameters:
        - name: category
          in: query
          description: Lọc theo danh mục
          schema:
            type: string
            enum: [fashion, electronics, tools, computers, phones, accessories]
        - name: search
          in: query
          description: Tìm kiếm theo tên hoặc mô tả
          schema:
            type: string
      responses:
        "200":
          description: Thành công
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ProductListResponse"

  /api/products/{id}:
    get:
      tags: [Products]
      summary: Chi tiết sản phẩm
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Thành công
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Product"
        "404":
          description: Không tìm thấy sản phẩm
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"

  # ──────────── Categories ────────────
  /api/categories:
    get:
      tags: [Categories]
      summary: Danh mục sản phẩm
      responses:
        "200":
          description: Thành công
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Category"

  # ──────────── Auth ────────────
  /api/auth/register:
    post:
      tags: [Auth]
      summary: Đăng ký tài khoản
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [name, email, password]
              properties:
                name:
                  type: string
                  example: "Nguyễn Văn A"
                email:
                  type: string
                  format: email
                  example: "user@allshop.vn"
                password:
                  type: string
                  minLength: 6
                  example: "123456"
      responses:
        "201":
          description: Đăng ký thành công
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AuthResponse"
        "400":
          description: Dữ liệu không hợp lệ
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
        "409":
          description: Email đã được đăng ký
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"

  /api/auth/login:
    post:
      tags: [Auth]
      summary: Đăng nhập
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [email, password]
              properties:
                email:
                  type: string
                  format: email
                  example: "user@allshop.vn"
                password:
                  type: string
                  example: "123456"
      responses:
        "200":
          description: Đăng nhập thành công
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AuthResponse"
        "401":
          description: Email hoặc mật khẩu không đúng
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"

  /api/auth/logout:
    post:
      tags: [Auth]
      summary: Đăng xuất 🔒
      security:
        - BearerAuth: []
      responses:
        "200":
          description: Đăng xuất thành công
          content:
            application/json:
              schema:
                type: object
                properties:
                  message:
                    type: string

  # ──────────── Users ────────────
  /api/users/profile:
    get:
      tags: [Users]
      summary: Lấy thông tin cá nhân 🔒
      security:
        - BearerAuth: []
      responses:
        "200":
          description: Thành công
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/User"
    put:
      tags: [Users]
      summary: Cập nhật thông tin cá nhân 🔒
      security:
        - BearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                name:
                  type: string
                phone:
                  type: string
                  nullable: true
      responses:
        "200":
          description: Cập nhật thành công
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/User"

  # ──────────── Cart ────────────
  /api/cart:
    get:
      tags: [Cart]
      summary: Lấy giỏ hàng 🔒
      security:
        - BearerAuth: []
      responses:
        "200":
          description: Thành công
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/CartItem"

  /api/cart/items:
    post:
      tags: [Cart]
      summary: Thêm sản phẩm vào giỏ 🔒
      security:
        - BearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [productId, quantity]
              properties:
                productId:
                  type: string
                  example: "1"
                quantity:
                  type: integer
                  minimum: 1
                  example: 1
      responses:
        "200":
          description: Đã thêm vào giỏ
          content:
            application/json:
              schema:
                type: object
                properties:
                  message:
                    type: string
        "404":
          description: Sản phẩm không tồn tại
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"

  /api/cart/items/{productId}:
    put:
      tags: [Cart]
      summary: Cập nhật số lượng 🔒
      security:
        - BearerAuth: []
      parameters:
        - name: productId
          in: path
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [quantity]
              properties:
                quantity:
                  type: integer
                  minimum: 1
      responses:
        "200":
          description: Đã cập nhật
          content:
            application/json:
              schema:
                type: object
                properties:
                  message:
                    type: string
        "404":
          description: Không tìm thấy trong giỏ
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
    delete:
      tags: [Cart]
      summary: Xóa khỏi giỏ hàng 🔒
      security:
        - BearerAuth: []
      parameters:
        - name: productId
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Đã xóa
          content:
            application/json:
              schema:
                type: object
                properties:
                  message:
                    type: string

  # ──────────── Orders ────────────
  /api/orders:
    post:
      tags: [Orders]
      summary: Tạo đơn hàng từ giỏ hàng 🔒
      description: Tạo đơn hàng mới từ tất cả sản phẩm trong giỏ. Giỏ hàng sẽ được xóa sau khi tạo đơn thành công.
      security:
        - BearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [name, phone, address]
              properties:
                name:
                  type: string
                  example: "Nguyễn Văn A"
                phone:
                  type: string
                  example: "0901234567"
                address:
                  type: string
                  example: "123 Nguyễn Huệ, Q.1, TP.HCM"
                note:
                  type: string
                  example: "Giao giờ hành chính"
      responses:
        "201":
          description: Đơn hàng được tạo
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Order"
        "400":
          description: Giỏ hàng trống hoặc dữ liệu không hợp lệ
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
    get:
      tags: [Orders]
      summary: Danh sách đơn hàng 🔒
      security:
        - BearerAuth: []
      responses:
        "200":
          description: Thành công
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Order"

  # ──────────── Invoices ────────────
  /api/orders/{id}/invoice:
    post:
      tags: [Invoices]
      summary: Tạo hóa đơn từ đơn hàng 🔒
      description: Tạo hóa đơn điện tử từ đơn hàng đã xác nhận. Mỗi đơn hàng chỉ có 1 hóa đơn active.
      security:
        - BearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          description: ID đơn hàng
          schema:
            type: string
      requestBody:
        content:
          application/json:
            schema:
              type: object
              properties:
                buyerTaxCode:
                  type: string
                  description: Mã số thuế người mua (tùy chọn)
                  example: "0987654321"
                taxRate:
                  type: number
                  description: Thuế suất VAT (mặc định 0.08 = 8%)
                  example: 0.08
      responses:
        "201":
          description: Hóa đơn được tạo
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Invoice"
        "400":
          description: Đơn hàng chưa được xác nhận
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
        "404":
          description: Không tìm thấy đơn hàng
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
        "409":
          description: Hóa đơn đã tồn tại cho đơn hàng này
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"

  /api/invoices:
    get:
      tags: [Invoices]
      summary: Danh sách hóa đơn 🔒
      security:
        - BearerAuth: []
      responses:
        "200":
          description: Thành công
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Invoice"

  /api/invoices/{id}:
    get:
      tags: [Invoices]
      summary: Chi tiết hóa đơn 🔒
      security:
        - BearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Thành công
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Invoice"
        "404":
          description: Không tìm thấy hóa đơn
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"

  /api/invoices/{id}/issue:
    put:
      tags: [Invoices]
      summary: Phát hành hóa đơn 🔒
      description: Chuyển trạng thái hóa đơn từ draft sang issued.
      security:
        - BearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Hóa đơn đã được phát hành
          content:
            application/json:
